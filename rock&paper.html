<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock,Paper and Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <header class="main-header">
           <h2 class="game-title">
            Let's Play
           </h2>
        </header>

        <section class="result-display">
            <h1 class="player-choice-text">
             ✊
            </h1>
            <h1 class="versus-text">VS</h1>
            <h1 class="cpu-choice-text">✊</h1>
        </section>

        <section class="score-board">
            <h4>Won: <span class="score-won-test">0</span></h4>
            <div class="divider-vertical"></div>
            <h4>Draw: <span class="score-draw-test">0</span></h4>
            <div class="divider-vertical"></div>
            <h4>Lost: <span class="score-lost-text">0</span></h4>
        </section>

        <section class="option-choice">
            <!-- First button should be Rock -->
            <div class="option-wrapper">
               <button class="choice-btn" value="rock"> <!-- Corrected from Paper -->
                    ✊
               </button>
            <h3 class="choice-label">Rock</h3> <!-- Corrected from Paper -->
            </div>

            <div class="option-wrapper">
                <button class="choice-btn" value="paper"> <!-- Corrected casing -->
                    ✋
                </button>
            <h3 class="choice-label">Paper</h3>
            </div>
            <div class="option-wrapper">
                <button class="choice-btn" value="Scissors">
                    ✌️
                </button>
                <h3 class="choice-label">scissors</h3>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
